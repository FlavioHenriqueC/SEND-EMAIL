<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPA Email</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Enviar E-mail via RPA</h2>
        <form action="/" method="POST">
            <div class="input-group">
                <label for="email_destino">E-mail de Destino:</label>
                <input type="email" id="email_destino" name="email_destino" placeholder="exemplo@email.com" required>
            </div>

            <div class="input-group">
                <label for="assunto">Assunto do E-mail:</label>
                <input type="text" id="assunto" name="assunto" placeholder="Digite o título do e-mail" required>
            </div>

            <div class="input-group">
                <label for="corpo_email">Corpo do E-mail:</label>
                <textarea id="corpo_email" name="corpo_email" rows="5" placeholder="Escreva sua mensagem aqui..." required></textarea>
            </div>

            <button type="submit">Disparar Automação</button>
        </form>
    </div>
</body>
</html>
